<div class="space-y-6">
    <div class="flex justify-between items-center px-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-900 border-none">Teams</h1>
            <p class="text-slate-500">Manage organization teams</p>
        </div>
        <app-button label="Create Team" icon="pi pi-plus" variant="primary" (onClick)="openAddDialog()"></app-button>
    </div>

    <p-card class="!shadow-sm !border-slate-300">
        <app-common-table [data]="store.teams()" [columns]="columns" [hasActions]="true" (edit)="onEdit($event)"
            (delete)="onDelete($event)">
        </app-common-table>
    </p-card>
</div>

<!-- Add/Edit Team Dialog -->
<p-dialog [header]="isEdit ? 'Edit Team' : 'Create New Team'" [(visible)]="showDialog" [modal]="true"
    [draggable]="false" [resizable]="false" [style]="{ width: '450px' }" class="!rounded-2xl">

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4 pt-4">
        <app-common-input label="Team Name" formControlName="name" placeholder="e.g. Backend Developers"
            [error]="getErrorMessage('name')">
        </app-common-input>

        <app-common-select label="Department" formControlName="departmentId" [options]="deptOptions()"
            placeholder="Select Department" [error]="getErrorMessage('departmentId')">
        </app-common-select>

        <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-300">
            <app-button label="Cancel" variant="secondary" (onClick)="showDialog = false"></app-button>
            <app-button type="submit" [label]="isEdit ? 'Update Team' : 'Save Team'" icon="pi pi-check"
                variant="primary"></app-button>
        </div>
    </form>
</p-dialog>
