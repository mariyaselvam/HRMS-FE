<div class="space-y-6">
    <div class="flex justify-between items-center px-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 border-none">Employees</h1>
            <p class="text-slate-500 dark:text-slate-400">Manage your company workforce</p>
        </div>
        <app-button label="Onboard Employee" icon="pi pi-user-plus" variant="primary"
            (onClick)="openAddDialog()"></app-button>
    </div>

    <div class="px-1 pt-2">
        <!-- Attendance Filter Toggle Action (Adapted) -->
        <div class="flex justify-end mb-4 px-1">
            <div class="flex items-center gap-3">
                <!-- Filter Trigger Button -->
                <button (click)="op.toggle($event)"
                    class="flex items-center gap-2.5 px-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 rounded-xl shadow-sm hover:border-indigo-500 dark:hover:border-indigo-500/50 transition-all active:scale-95 group">
                    <i class="pi pi-filter text-slate-400 group-hover:text-indigo-500 transition-colors"></i>
                    <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Filters</span>
                    <span *ngIf="activeFilterCount() > 0"
                        class="flex items-center justify-center min-w-[20px] h-5 px-1.5 text-[10px] font-bold bg-indigo-600 text-white rounded-full">
                        {{ activeFilterCount() }}
                    </span>
                </button>

                <!-- Reset All (Quick Action) -->
                <button *ngIf="activeFilterCount() > 0" (click)="clearFilters()"
                    class="p-2.5 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-xl transition-all"
                    title="Clear all filters">
                    <i class="pi pi-refresh text-sm"></i>
                </button>
            </div>
        </div>

        <p-card styleClass="!shadow-none !border-slate-300 dark:!border-slate-800 !mt-2 !overflow-hidden">
            <app-common-table [data]="filteredEmployees()" [columns]="columns" [hasActions]="true" [showView]="true"
                (view)="onView($event)" (edit)="onEdit($event)" (delete)="onDelete($event)">
            </app-common-table>
        </p-card>
    </div>

    <!-- The Filter Popover (Placed at bottom to prevent destruction/NG0100 errors) -->
    <p-popover #op appendTo="body"
        styleClass="!rounded-2xl !shadow-2xl !border-slate-300 dark:!border-slate-800 !p-0 !overflow-hidden !mt-2">
        <div class="w-[340px] md:w-[420px] bg-white dark:bg-slate-950">
            <div
                class="p-4 bg-slate-50/80 dark:bg-slate-900/50 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <i class="pi pi-sliders-h text-indigo-500"></i>
                    <span class="font-bold text-sm text-slate-800 dark:text-slate-200">Refine Search</span>
                </div>
                <button (click)="clearFilters()"
                    class="text-[10px] font-bold text-indigo-600 hover:text-indigo-700 dark:text-indigo-400 uppercase tracking-widest px-2 py-1 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 rounded-lg transition-all">
                    Reset
                </button>
            </div>

            <div class="p-6 flex flex-col gap-6">
                <!-- Search -->
                <app-common-input label="Employee Search" [(ngModel)]="searchQuery" (ngModelChange)="searchQuery.set($event)"
                    placeholder="Search Code or Email..." icon="pi pi-search">
                </app-common-input>

                <!-- Department Filter -->
                <app-common-select label="Department" [options]="departments()" [(ngModel)]="selectedDepartment"
                    (ngModelChange)="selectedDepartment.set($event)" placeholder="All Departments" appendTo="body">
                </app-common-select>

                <!-- Location Filter -->
                <app-common-select label="Branch" [options]="locations()" [(ngModel)]="selectedLocation"
                    (ngModelChange)="selectedLocation.set($event)" placeholder="All Branches" appendTo="body">
                </app-common-select>
                
                <!-- Status Filter -->
                <app-common-select label="Status" [options]="statuses()" [(ngModel)]="selectedStatus"
                    (ngModelChange)="selectedStatus.set($event)" placeholder="All Status" appendTo="body">
                </app-common-select>
            </div>

            <div
                class="p-4 bg-slate-50 dark:bg-slate-900/80 border-t border-slate-100 dark:border-slate-800 text-center">
                <div
                    class="inline-flex items-center gap-2 px-3 py-1.5 bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 rounded-full">
                    <i class="pi pi-info-circle text-[10px]"></i>
                    <span class="text-[10px] font-semibold">Filters apply in real-time</span>
                </div>
            </div>
        </div>
    </p-popover>
</div>
